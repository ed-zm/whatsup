services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsup-postgres
    environment:
      POSTGRES_DB: whatsup
      POSTGRES_USER: whatsup
      POSTGRES_PASSWORD: whatsup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsup -d whatsup"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - whatsup

  cassandra:
    image: cassandra:5.0
    container_name: whatsup-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: whatsup-local
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh 127.0.0.1 9042 -e \"SELECT release_version FROM system.local;\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - whatsup

  cassandra-init:
    image: cassandra:5.0
    container_name: whatsup-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./database/cassandra/001_messages.cql:/schema/001_messages.cql:ro
    command: ["cqlsh", "cassandra", "9042", "-f", "/schema/001_messages.cql"]
    restart: "no"
    networks:
      - whatsup

  redis:
    image: redis:7.4-alpine
    container_name: whatsup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - whatsup

  kafka:
    image: apache/kafka:4.2.0
    container_name: whatsup-kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      - whatsup

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: whatsup-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - whatsup

  localstack:
    image: localstack/localstack:3
    container_name: whatsup-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET_NAME: whatsapp-media-local
      MANAGE_INFRA_WITH_TERRAFORM: "true"
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack/ready.d:/etc/localstack/init/ready.d:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - whatsup

  auth-service:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        NODE_IMAGE: node:22-alpine
        SERVICE_PATH: services/auth-service
    container_name: whatsup-auth-service
    environment:
      PORT: 3001
      DATABASE_URL: postgres://whatsup:whatsup@postgres:5432/whatsup
      JWT_SECRET: local-dev-secret
      JWT_EXPIRES_IN: 1h
      OTP_PEPPER: local-dev-otp-pepper
      OTP_TTL_MINUTES: 5
      DEFAULT_USER_ROLE: user
      RUN_MIGRATIONS: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./services/auth-service:/app/service
      - auth_node_modules:/app/service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - whatsup

  media-service:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        NODE_IMAGE: node:22-alpine
        SERVICE_PATH: services/media-service
    container_name: whatsup-media-service
    environment:
      PORT: 3003
      JWT_SECRET: local-dev-secret
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL_S3: http://localstack:4566
      S3_ENDPOINT: http://localstack:4566
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_NAME: whatsapp-media-local
      S3_PRESIGNED_URL_TTL_SECONDS: 300
    ports:
      - "3003:3003"
    volumes:
      - ./services/media-service:/app/service
      - media_node_modules:/app/service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - whatsup

  realtime-gateway:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        NODE_IMAGE: node:22-alpine
        SERVICE_PATH: services/realtime-gateway
    container_name: whatsup-realtime-gateway
    environment:
      PORT: 3002
      HOST: 0.0.0.0
      REGION: local
      JWT_SECRET: local-dev-secret
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: realtime-gateway
    ports:
      - "3002:3002"
    volumes:
      - ./services/realtime-gateway:/app/service
      - realtime_node_modules:/app/service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - whatsup

  messaging-service:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        NODE_IMAGE: node:22-alpine
        SERVICE_PATH: services/messaging-service
    container_name: whatsup-messaging-service
    environment:
      DATABASE_URL: postgres://whatsup:whatsup@postgres:5432/whatsup
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: messaging-service
      KAFKA_GROUP_ID: messaging-router-service
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_LOCAL_DATACENTER: datacenter1
      CASSANDRA_KEYSPACE: whatsup_messages
    volumes:
      - ./services/messaging-service:/app/service
      - messaging_node_modules:/app/service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - whatsup

networks:
  whatsup:
    driver: bridge

volumes:
  postgres_data:
  cassandra_data:
  redis_data:
  kafka_data:
  localstack_data:
  auth_node_modules:
  media_node_modules:
  realtime_node_modules:
  messaging_node_modules:
